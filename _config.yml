# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: DAWN Research Group | Dr. Yunzhe Liu
first_name: Yunzhe
middle_name: 
last_name: Liu
contact_note: >
  email: yzliu@soci.ecnu.edu.cn
description: >
  Official website of the DAWN (Data Analytics for Well-being & Neighborhoods) Research Group, led by Dr. Yunzhe Liu at East China Normal University. 华东师范大学 DAWN 课题组 (福祉·邻里·数据分析) 官方网站，专注于计算社会科学、地理人工智能 (GeoAI) 与社会空间分异研究。
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: "刘贇喆, 华东师范大学, ECNU, DAWN Research Group, 计算社会科学, 空间分异, GeoAI, Yunzhe Liu, Computational Social Science, Urban Analytics" 
lang: en 
icon: /assets/img/logo.png

# 【核心修正】必须匹配你现在的仓库名，否则 GitHub Pages 无法正确部署
url: https://dawn-ecnu.github.io 
baseurl: "" 
last_updated: true 
impressum_path: 
back_to_top: true 

# -----------------------------------------------------------------------------
# Author Info (SEO 抓取关键)
# -----------------------------------------------------------------------------
author:
  name: Yunzhe Liu
  email: yzliu@soci.ecnu.edu.cn

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: default 
repo_theme_dark: dark 
repo_trophies:
  enabled: true
  theme_light: flat 
  theme_dark: gitdimmed 

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: true
search_enabled: false
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 1100px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
serve_og_meta: true 
serve_schema_org: true 

# -----------------------------------------------------------------------------
# Blog & Collections
# -----------------------------------------------------------------------------
blog_name: DAWN Blog
blog_description: a simple whitespace theme for academics
permalink: /blog/:year/:title/
pagination:
  enabled: true

collections:
  books:
    output: true
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll settings & Plugins
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------
scholar:
  last_name: [Liu]
  first_name: [Yunzhe, Y.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  group_by: year
  group_order: descending

# -----------------------------------------------------------------------------
# Imagemagick
# -----------------------------------------------------------------------------
imagemagick:
  enabled: true 
  widths: [480, 800, 1400]
  input_directories: ["assets/img/"]
  input_formats: [".jpg", ".jpeg", ".png", ".webp"]
  output_formats:
    webp: "-auto-orient -quality 85"

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------
enable_google_analytics: false 
enable_google_verification: false 
enable_darkmode: true 
enable_progressbar: true 
enable_masonry: true 
enable_math: true 

